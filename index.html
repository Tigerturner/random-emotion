<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zufallsgefuehl</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="blob blob-a" aria-hidden="true"></div>
      <div class="blob blob-b" aria-hidden="true"></div>
      <div class="blob blob-c" aria-hidden="true"></div>

      <div class="emotion-panel">
        <section class="emotion-card" aria-live="polite">
          <button id="emotionButton" class="emotion-display" type="button">
            <p class="hint">Improv Emotions-Finder</p>
            <h1 id="emotionText" class="emotion-text--neutral">Neugierig</h1>
          </button>
        </section>

        <div class="category-filters" role="group" aria-label="Gefühlskategorie wählen">
          <p class="hint" style="text-align: center;">Wähle eine Gefühlskategorie:</p>
          <button class="category-filter category-filter--positive" data-filter="positive Gefühle" type="button">
            positives Gefühl
          </button>
          <button class="category-filter category-filter--negative" data-filter="negative Gefühle" type="button">
            negatives Gefühl
          </button>
          <button class="category-filter category-filter--neutral" data-filter="neutrale Gefühle" type="button">
            neutrales Gefühl
          </button>
          <button class="category-filter category-filter--all is-active" data-filter="all" type="button">
            zufälliges Gefühl
          </button>
        </div>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
